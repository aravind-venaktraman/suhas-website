    <!-- ─── Core SEO ─────────────────────────────────────── -->
    <!--
      KEY CHANGES:
      1. Title now includes full name + differentiating keywords to compete
         against the Telugu actor "Suhas" and other Suhas artists on Spotify
      2. Description is longer (155 chars target), front-loads the unique value prop
      3. Added geo and language targeting
      4. Canonical points to the CUSTOM DOMAIN (not vercel subdomain)
    -->
    <title>Suhas | Progressive Jazz Fusion Pianist & Composer — Stream Fractals</title>
    <meta name="description" content="Suhas is a progressive jazz fusion pianist and composer. Stream his debut release Fractals — featuring polyrhythmic piano improvisation, modern jazz composition, and cinematic fusion. Available on Spotify, Apple Music & YouTube." />
    <meta name="keywords" content="Suhas, Suhas pianist, Suhas jazz, Suhas composer, Suhas music, Suhas Fractals, progressive jazz fusion, jazz fusion pianist, modern jazz piano, polyrhythmic jazz, jazz improvisation, instrumental jazz, contemporary jazz fusion, piano composer, Fractals album jazz" />

    <meta name="theme-color" content="#000000" />
    <meta name="author" content="Suhas" />
    <meta name="rating" content="general" />

    <meta name="geo.region" content="US" />
    <link rel="alternate" hreflang="en" href="https://suhasmusic.com" />

    <!-- ─── Structured Data — Person/MusicGroup (replaces invalid MusicianProfile) ── -->
    <!--
      CRITICAL FIX: "MusicianProfile" is NOT a valid Schema.org type.
      Changed to "Person" with "musician" as jobTitle, which Google actually recognizes.
      Added @id for entity linking, knowsAbout for topic authority,
      and performerIn for event discoverability.
    -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "@id": "https://suhasmusic.com/#artist",
      "name": "Suhas",
      "alternateName": ["SUHAS", "Suhas Music"],
      "url": "https://suhasmusic.com",
      "description": "Progressive jazz fusion pianist and composer. Creator of Fractals — an exploration of polyrhythms, melodic improvisation, and modern jazz.",
      "image": {
        "@type": "ImageObject",
        "url": "https://suhasmusic.com/images/album-art.PNG",
        "width": 1200,
        "height": 1200
      },
      "jobTitle": "Pianist and Composer",
      "knowsAbout": [
        "Jazz Fusion",
        "Progressive Jazz",
        "Piano Improvisation",
        "Music Composition",
        "Polyrhythms",
        "Modern Jazz"
      ],
      "genre": ["Progressive Jazz Fusion", "Jazz Fusion", "Modern Jazz", "Contemporary Jazz"],
      "sameAs": [
        "https://www.youtube.com/@Suhasmusicofficial",
        "https://www.instagram.com/suhas.als",
        "https://open.spotify.com/artist/7jrJXlWGH3Z1L3r7q4qY8K",
        "https://music.apple.com/us/artist/suhas/1768715441"
      ]
    }
    </script>

          "@type": "MusicAlbum",
          "@id": "https://suhasmusic.com/#fractals"
