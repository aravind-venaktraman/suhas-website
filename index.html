          <h1>Suhas Padav — Progressive Jazz Fusion Pianist &amp; Composer</h1>
          <p>Suhas Padav (Suhas) is a progressive jazz fusion pianist and composer. His debut single <em>Fractals</em> features bassist <strong>Ric Fierabracci</strong> and drummer <strong>Marco Minnemann</strong> — an exploration of polyrhythmic piano improvisation and modern jazz composition.</p>
        </section>

        <section id="music">
          <h2>Fractals — Debut Single by Suhas Padav</h2>
          <p><em>Fractals</em> is a progressive jazz fusion single by pianist and composer Suhas Padav, featuring legendary bassist Ric Fierabracci and drummer Marco Minnemann. The track blends polyrhythmic piano improvisation with modern jazz composition, exploring the chaotic symmetry of jazz.</p>
          <p>Suhas Padav's writing pairs composed structure with improvisation — shaped by jazz harmony, classical form, and progressive rock. <em>Fractals</em> is the first single from a larger project currently in production.</p>
          <h3>Stream Fractals</h3>
          <ul>
            <li><a href="https://open.spotify.com/artist/7jrJXlWGH3Z1L3r7q4qY8K" rel="noopener" target="_blank">Listen to Suhas on Spotify</a></li>
            <li><a href="https://music.apple.com/us/artist/suhas/1768715441" rel="noopener" target="_blank">Listen to Suhas on Apple Music</a></li>
            <li><a href="https://www.youtube.com/@Suhasmusicofficial" rel="noopener" target="_blank">Watch Suhas on YouTube</a></li>
          </ul>
          <h3>About the Musicians</h3>
          <p><strong>Ric Fierabracci</strong> is an American jazz fusion bassist known for his work with Chick Corea, Jean-Luc Ponty, and Billy Cobham. <strong>Marco Minnemann</strong> is a German drummer and multi-instrumentalist who has performed with Steven Wilson, Joe Satriani, and The Aristocrats.</p>
        </section>

        <section id="about">
          <h2>About Suhas Padav</h2>
          <p>Suhas Padav (known musically as Suhas) is a pianist and composer creating progressive jazz fusion music. Not to be confused with Suhas the Telugu film actor or other musicians named Suhas — Suhas Padav is a jazz fusion pianist whose work draws from jazz improvisation, complex polyrhythms, and modern harmonic language.</p>
          <p>He has been playing and studying music from a young age, and spent years building a compositional voice from the ground up. His writing pairs composed structure with improvisation — shaped by jazz harmony, classical form, and progressive rock. Suhas Padav crafts music that rewards deep listening — intricate arrangements that balance technical virtuosity with emotional expression.</p>
          <p><em>Fractals</em> is the first single from a larger project currently in production. More music and collaborations are coming in 2026.</p>
        </section>
